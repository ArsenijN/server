<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<!--
  mitm.html — StreamSaver "man in the middle"

  Signals the opener's MessageChannel port to the service worker so the SW
  can intercept the fake download URL and pipe the stream as a file response.

  FluxDrop note: We do NOT register a second service worker here.
  The FluxDrop SW (/fluxdrop_pp/sw.js) already covers the /fluxdrop_pp/
  scope AND contains the StreamSaver message/fetch handlers merged in.
  We simply look up that existing registration — no second SW, no scope
  conflict, no Service-Worker-Allowed header needed.
-->
<script>
// Keep the SW alive by pinging it every 10 s (prevents browser from
// suspending it mid-download when no transferable stream is used).
let keepAlive = () => {
  keepAlive = () => {}
  var interval = setInterval(() => {
    if (sw) sw.postMessage('ping')
  }, 10000)
}

// Buffer messages that arrive before the SW is ready.
let messages = []
window.onmessage = evt => messages.push(evt)

let sw    = null
let scope = ''

// Instead of registering a new SW, find the FluxDrop SW that the main page
// already registered at /fluxdrop_pp/.  It handles StreamSaver messages too.
function getWorker() {
  const APP_SCOPE = '/fluxdrop_pp/'
  return navigator.serviceWorker.getRegistration(APP_SCOPE).then(swReg => {
    if (!swReg) {
      // Main page hasn't registered yet — shouldn't happen normally because
      // mitm.html is always loaded from inside the app, but handle it anyway.
      return navigator.serviceWorker.register('/fluxdrop_pp/sw.js', { scope: APP_SCOPE })
    }
    return swReg
  }).then(swReg => {
    scope = swReg.scope

    if (swReg.active) {
      sw = swReg.active
      return
    }

    // SW is installing/waiting — wait for it to activate.
    const pending = swReg.installing || swReg.waiting
    if (!pending) return
    return new Promise(resolve => {
      const fn = () => {
        if (pending.state === 'activated') {
          pending.removeEventListener('statechange', fn)
          sw = swReg.active
          resolve()
        }
      }
      pending.addEventListener('statechange', fn)
    })
  })
}

function onMessage(event) {
  let { data, ports, origin } = event

  if (!ports || !ports.length)  throw new TypeError("[StreamSaver] No messageChannel sent")
  if (typeof data !== 'object') throw new TypeError("[StreamSaver] Expected an object")

  data.origin   = origin
  data.referrer = data.referrer || document.referrer || origin
  data.streamSaverVersion = new URLSearchParams(location.search).get('version')

  if (!data.pathname) {
    data.pathname = Math.random().toString().slice(-6) + '/' + (data.filename || 'download')
  }

  // Strip leading slashes; strip protocol from origin.
  data.pathname = data.pathname.replace(/^\/+/g, '')
  const org = origin.replace(/(^\w+:|^)\/\//, '')

  // Build the intercept URL under the app scope so the FluxDrop SW sees it.
  data.url = new URL(scope + org + '/' + data.pathname).toString()

  if (!data.url.startsWith(scope + org + '/')) {
    throw new TypeError('[StreamSaver] bad data.pathname')
  }

  const transferable = data.readableStream
    ? [ports[0], data.readableStream]
    : [ports[0]]

  if (!(data.readableStream || data.transferringReadable)) keepAlive()

  return sw.postMessage(data, transferable)
}

if (window.opener) {
  window.opener.postMessage('StreamSaver::loadedPopup', '*')
}

if (navigator.serviceWorker) {
  getWorker().then(() => {
    window.onmessage = onMessage
    messages.forEach(window.onmessage)
  })
} else {
  keepAlive()
}
</script>
</body>
</html>
