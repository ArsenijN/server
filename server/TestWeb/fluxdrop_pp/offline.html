<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxDrop — Offline</title>
    <link rel="icon" type="image/svg" sizes="32x32" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f9ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #1e293b;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .icon { font-size: 4rem; margin-bottom: 1.25rem; }
        h1 { font-size: 1.5rem; font-weight: 700; color: #1e40af; margin-bottom: 0.5rem; }
        p  { font-size: 0.95rem; color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: #1e40af;
            font-weight: 700;
            font-size: 1.3rem;
        }
        .logo-row img { width: 28px; height: 28px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-row">
            <img src="icon.svg" alt="FluxDrop logo">
            FluxDrop
        </div>
        <div class="icon">📡</div>
        <h1>You're offline</h1>
        <p>
            Seems like you're not connected to the internet.<br>
            Please check your connection and try again.
        </p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
