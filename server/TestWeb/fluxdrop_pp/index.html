<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/fluxdrop_pp/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxDrop</title>
    <link rel="icon" type="image/svg" sizes="32x32" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="tailwindcss.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-start pt-8 px-4 pb-4">
    <!-- Header -->
    <header class="w-full max-w-5xl mb-4 flex justify-between items-center">
        <h1 class="text-3xl font-bold text-blue-800 flex items-center">
            <img src="icon.svg" class="h-8 w-8 mr-2 inline" alt="FluxDrop logo">
            FluxDrop
        </h1>
        <div id="auth-controls">
            <!-- Populated by JS -->
        </div>
    </header>

    <main id="app-root" class="w-full max-w-5xl">
        <!-- App content is rendered here by JS -->
    </main>

    <!-- Message Modal -->
    <div id="message-modal" class="modal-overlay hidden">
        <div class="modal-content text-center">
            <h3 id="message-modal-title" class="text-xl font-semibold mb-4"></h3>
            <p id="message-modal-content" class="mb-6"></p>
            <button class="btn w-full" onclick="hideModal('message-modal')">OK</button>
        </div>
    </div>

    <!-- Media / Text Preview Modal -->
    <div id="preview-modal" class="modal-overlay hidden" onclick="if(event.target===this)closePreview()">
        <div class="preview-modal-content">
            <button class="preview-close-btn" onclick="closePreview()" title="Close">✕</button>
            <div id="preview-title" style="color:#94a3b8;font-size:13px;padding-right:2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
            <div id="preview-body"></div>
            <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px">
                <button id="preview-download-btn" class="btn text-sm" style="display:none">⬇ Download</button>
            </div>
        </div>
    </div>
    <script src="/fluxdrop_pp/script.js"></script>

    <!--
        Pure-CSS style-load fallback.
        The banner is visible by DEFAULT (no JS needed).
        The compiled stylesheet hides it by defining the .fd-css-loaded rule.
        If the stylesheet never loads, the rule never exists, the banner stays.
    -->
    <div id="fd-style-fallback"
         style="position:fixed;top:0;left:0;width:100%;
                padding:1.25rem 1.5rem;background:#fef3c7;color:#92400e;
                font-family:sans-serif;font-size:14px;line-height:1.6;
                z-index:99999;border-bottom:2px solid #fde68a;
                box-shadow:0 2px 8px rgba(0,0,0,.1)">
        <strong>⚠ Styles are taking a while to load.</strong>
        Check your internet connection and try reloading the page.
        If the problem persists, open the browser console (F12) and look
        for network errors on <code>tailwindcss.css</code>.
        <button onclick="this.parentElement.style.display='none'"
                style="margin-left:1rem;padding:3px 10px;border:1px solid #d97706;
                       border-radius:6px;background:white;cursor:pointer;font-size:13px">
            Dismiss
        </button>
    </div>

    <!-- No-JS fallback: only rendered when JavaScript is disabled/unavailable -->
    <noscript>
        <div style="position:fixed;top:0;left:0;width:100%;
                    padding:1.25rem 1.5rem;background:#fee2e2;color:#991b1b;
                    font-family:sans-serif;font-size:14px;line-height:1.6;
                    z-index:100000;border-bottom:2px solid #fca5a5;
                    box-shadow:0 2px 8px rgba(0,0,0,.1)">
            <strong>⚠ JavaScript is required to use FluxDrop.</strong>
            Please enable JavaScript in your browser settings and reload the page.
        </div>
    </noscript>
</body>
</html>
